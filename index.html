<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Research</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Computer Science Research</h1>
    </header>
    <main class="content">
        <section class="control-panel">
            <div class="search">
                <input type="text" id="search-input" placeholder="type what you want to serarch">
            </div>
            <div class="filter-dropdown">
                <select id="select-sorting">
                    <option value="cited_by_count">Most cited</option>
                    <option value="publication_year">Latest First</option>
                </select>
                <label>
                    <input type="checkbox" id="open-source" checked>
                    Open Source Only (Free)
                </label>
            </div>
            <button id="search-btn">Search</button>
        </section>
        <section id="getting-data" class="data-retrieval">
            <p>The result</p>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
